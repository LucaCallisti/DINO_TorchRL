collector:
  total_frames: 1000000
  frames_per_batch: 1000
  init_random_frames: 5000
  env_per_collector: 1
  device: ''
replay_buffer:
  size: 1000000
  prb: false
  scratch_dir: null
optim:
  lr: 0.0003
  weight_decay: 0.0
  adam_eps: 1.0e-08
  batch_size: 256
  gamma: 0.99
  target_update_polyak: 0.995
  alpha_init: 1.0
  loss_function: l2
  utd_ratio: 1.0
logger:
  backend: wandb
  project_name: torchrl_sac
  group_name: default
  exp_name: sac_experiment
  mode: online
  eval_iter: 10000
  video: false
  num_eval_episodes: 10
compile:
  compile: true
  compile_mode: ''
  cudagraphs: false
