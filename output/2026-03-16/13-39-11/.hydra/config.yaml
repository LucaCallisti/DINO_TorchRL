env:
  name: reach-v3
  task: ''
  library: metaworld
  max_episode_steps: 150
  pixel_input: true
  seed: 42
collector:
  total_frames: 1000000
  init_random_frames: 5000
  frames_per_batch: 256
  device: null
  env_per_collector: 8
  reset_at_each_iter: false
replay_buffer:
  size: 200000
  prb: 0
  scratch_dir: null
  device: cpu
optim:
  utd_ratio: 1.0
  gamma: 0.99
  loss_function: l2
  lr: 0.0001
  alpha_lr: 0.0001
  alpha_init: 1.5
  alpha_target: 0.25
  weight_decay: 0.0
  batch_size: 256
  target_update_polyak: 0.995
  adam_eps: 1.0e-08
  seed: 100
logger:
  backend: wandb
  entity: CLIP_RL
  project_name: torchrl_example_sac
  group_name: null
  exp_name: ${env.name}_SAC
  mode: online
  num_eval_episodes: 5
  eval_iter: 50000
  video: false
compile:
  compile: true
  compile_mode: reduce-overhead
  cudagraphs: false
network:
  hidden_sizes:
  - 256
  - 256
  activation: relu
  default_policy_scale: 1.0
  scale_lb: 0.0001
  device: cuda:0
