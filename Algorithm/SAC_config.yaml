
hydra:
  run:
    dir: ./output/${now:%Y-%m-%d}/${now:%H-%M-%S}

# environment and task
env:
  name: reach-v3
  task: ""
  library: metaworld
  max_episode_steps: 150
  pixel_input: True
  seed: 42

# collector
collector:
  total_frames: 1_000_000
  init_random_frames: 20_000
  frames_per_batch: 256
  device:
  env_per_collector: 8
  reset_at_each_iter: False

# replay buffer
replay_buffer:
  size: 200_000
  prb: 0 # use prioritized experience replay
  scratch_dir:
  device: 'cpu'

# optim
optim:
  utd_ratio: 0.25  # More conservative updates to reduce critic overfit / actor collapse.
  gamma: 0.99
  loss_function: l2
  lr: 3.0e-4
  alpha_lr: 1.0e-5
  alpha_init: 1
  alpha_target: 0.25 # multiplier
  weight_decay: 0.0
  batch_size: 128
  target_update_polyak: 0.995
  adam_eps: 1.0e-8
  seed: 100

# logging
logger:
  backend: wandb
  entity: CLIP_RL
  project_name: torchrl_example_sac
  group_name: null
  exp_name: ${env.name}_SAC
  mode: online
  num_eval_episodes: 5
  eval_iter: 25_000
  video: True
  grad_norm : True

# compile
compile:
  compile: True            # Enable torch.compile for the update function
  compile_mode: "reduce-overhead"          # Mode for torch.compile ("default", "reduce-overhead", etc.)
  cudagraphs: False         # Enable CudaGraphModule for faster GPU execution

# network
network:
  hidden_sizes: [256, 256]
  activation: relu
  default_policy_scale: 1.0
  scale_lb: 0.05
  device: 'cuda:0'