
hydra:
  run:
    dir: ./output/${now:%Y-%m-%d}/${now:%H-%M-%S}

# environment and task
env:
  name: reach-v3
  task: ""
  library: metaworld
  max_episode_steps: 150
  pixel_input: True
  seed: 42

# collector
collector:
  total_frames: 1_000_000
  init_random_frames: 25000
  frames_per_batch: 1000
  init_env_steps: 1000
  device:
  env_per_collector: 2
  reset_at_each_iter: False

# replay buffer
replay_buffer:
  size: 1000000
  prb: 0 # use prioritized experience replay
  scratch_dir:

# optim
optim:
  utd_ratio: 1.0  # UTD ratio 1.0: performs exactly one gradient update for every environment step, balancing learning frequency with data collection.
  gamma: 0.99
  loss_function: l2
  lr: 3.0e-4
  weight_decay: 0.0
  batch_size: 256
  target_update_polyak: 0.995
  alpha_init: 1.0
  adam_eps: 1.0e-8

# logging
logger:
  backend: wandb
  project_name: torchrl_example_sac
  group_name: null
  exp_name: ${env.name}_SAC
  mode: online
  eval_iter: 25000
  video: False

# compile
compile:
  compile: True            # Enable torch.compile for the update function
  compile_mode: "reduce-overhead"          # Mode for torch.compile ("default", "reduce-overhead", etc.)
  cudagraphs: False         # Enable CudaGraphModule for faster GPU execution

# network
network:
  hidden_sizes: [256, 256]
  activation: relu
  default_policy_scale: 1.0
  scale_lb: 0.0001
  device:
